name: nova_voice_assistant
description: Modern Flutter voice assistant with animated UI and realtime websocket audio streaming.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  intl: ^0.19.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1
  provider: ^6.1.2
  record: ^6.0.0
  flutter_sound: ^9.17.8
  logger: ^2.6.2
  shared_preferences: ^2.3.4
  web_socket_channel: ^3.0.1

dev_dependencies:
  flutter_lints: ^3.0.2
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
